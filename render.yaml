services:
  - type: web
    name: david-goggins-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false  # SECURITY: Must be set manually in Render dashboard
      - key: SLACK_SIGNING_SECRET
        sync: false  # SECURITY: Must be set manually in Render dashboard
      - key: SLACK_CHANNEL
        value: "#general"
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false  # SECURITY: Must be set manually in Render dashboard
      - key: NODE_ENV
        value: "production"
    healthCheckPath: /health 